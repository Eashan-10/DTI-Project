<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brain Buzz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container"> 
  <header>
    <h1>Brain Buzz</h1>
    <p>Challenge Yourself and Test your knowledge</p>
  </header> 
  <section id="setup-section">
    <h2>Start Quiz</h2>
    <label>Enter Name:</label>
    <input type="text" id="username" placeholder="Your name">

<label>Select Category:</label>
<select id="category">
  <option value="" disabled selected>Select Category</option>
  <option value="math">Mathematics</option>
  <option value="science">Science</option>
  <option value="gk">General Knowledge</option>
  <option value="tech">Technology</option>
</select>

<label>Select Difficulty:</label>
<select id="difficulty">
  <option value="" disabled selected>Select Difficulty</option>
  <option value="easy">Easy</option>
  <option value="medium">Medium</option>
  <option value="hard">Hard</option>
</select>
<button id="start-btn">Start Quiz</button>
</section>  
  
<section id="quiz-section" style="display:none;">
<div class="quiz-info">
  <span id="player-name"></span>
  <span id="current-category"></span>
  <span id="timer">00:00</span>
</div>


<div class="question-box">
  <h2 id="question-text">Question appears here</h2>
</div>

<div id="options-container">
</div>

<div class="controls">
  <button id="next-btn">Next</button>
  <button id="skip-btn">Skip</button>
</div>

  </section> <section id="result-section" style="display:none;">
    <h2>Quiz Completed </h2>
    <p id="final-score"></p>
    <p id="performance-msg"></p><button id="restart-btn">Play Again</button>
  </section> 
  
  <section id="leaderboard-section">
    <h2>Leaderboard</h2>
    <ul id="leaderboard-list">
    </ul>
  </section>
</div>
  <script src="script.js"> 
   </script>
</body>
</html>
